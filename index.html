<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ali Khan | Personal Fitness Coach</title>
<style>
:root{--bg:#080808;--card:#141414;--red:#e52b2b;--text:#f7f7f7;--muted:#aaa}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,sans-serif}a{color:inherit;text-decoration:none}.wrap{width:min(1120px,90%);margin:auto}
nav{position:sticky;top:0;z-index:9;background:#080808e8;border-bottom:1px solid #292929}.nav{height:68px;display:flex;align-items:center;justify-content:space-between}.logo{font-size:24px;font-weight:900}.logo span{color:var(--red)}.navlinks{display:flex;gap:20px;font-size:14px}
.hero{min-height:88vh;display:grid;grid-template-columns:1fr 1fr;align-items:center;gap:35px}.hero h1{font-size:clamp(48px,7vw,86px);line-height:.98;margin:12px 0 22px;text-transform:uppercase}.eyebrow{color:var(--red);font-weight:bold;letter-spacing:2px;text-transform:uppercase}.muted{color:var(--muted);font-size:18px;line-height:1.7}.hero img,.about img{width:100%;border-radius:14px;object-fit:cover}.hero img{height:70vh;object-position:top}
.btn{display:inline-block;background:var(--red);padding:14px 20px;border-radius:7px;font-weight:bold;margin:18px 8px 0 0}.outline{background:transparent;border:1px solid var(--red)}
section{padding:80px 0}.alt{background:#0e0e0e}h2{font-size:clamp(36px,5vw,58px);text-transform:uppercase;margin:8px 0 20px}.about{display:grid;grid-template-columns:.8fr 1.2fr;gap:45px;align-items:center}.about img{max-height:600px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:30px}.card{background:var(--card);border:1px solid #292929;border-radius:10px;padding:24px}.card h3{margin-top:0}.card img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:8px}
.empty{color:#777;border:1px dashed #444;padding:40px;text-align:center;border-radius:10px;grid-column:1/-1}
.video{aspect-ratio:16/9;width:100%;border:0;border-radius:8px}.wa{position:fixed;right:20px;bottom:20px;background:#25D366;padding:16px;border-radius:999px;font-weight:bold;z-index:10}
footer{padding:35px 0;border-top:1px solid #292929;color:#888}
@media(max-width:760px){.navlinks{display:none}.hero,.about{grid-template-columns:1fr}.hero{padding:50px 0}.hero img{height:58vh}.grid{grid-template-columns:1fr}}
</style></head>
<body>
<nav><div class="wrap nav"><div class="logo">ALI <span>KHAN</span></div><div class="navlinks"><a href="#about">About</a><a href="#services">Services</a><a href="#transformations">Transformations</a><a href="#vlogs">Vlogs</a></div></div></nav>
<main id="app"><div class="wrap" style="padding:80px 0">Loading website…</div></main>
<script>
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
function yt(url){try{let u=new URL(url);if(u.hostname.includes('youtu.be'))return u.pathname.slice(1);if(u.searchParams.get('v'))return u.searchParams.get('v');let m=u.pathname.match(/\/shorts\/([^/]+)/);return m?m[1]:''}catch{return''}}
fetch('/site.json?'+Date.now()).then(r=>r.json()).then(d=>{
 const wa='https://wa.me/'+encodeURIComponent(d.whatsapp)+'?text='+encodeURIComponent("Hi Coach Ali, I'm interested in fitness coaching.");
 const trans=(d.transformations||[]).length?(d.transformations||[]).map(x=>`<article class="card"><img src="${esc(x.image)}"><h3>${esc(x.title)}</h3><p class="muted">${esc(x.caption)}</p></article>`).join(''):'<div class="empty">Transformation photos will appear here.</div>';
 const vlogs=(d.vlogs||[]).length?(d.vlogs||[]).map(x=>{let id=yt(x.youtube_url);return `<article class="card">${id?`<iframe class="video" src="https://www.youtube.com/embed/${esc(id)}" allowfullscreen></iframe>`:''}<h3>${esc(x.title)}</h3><p class="muted">${esc(x.description)}</p></article>`}).join(''):'<div class="empty">Your vlogs will appear here.</div>';
 document.title=esc(d.coach_name)+' | Personal Fitness Coach';
 document.getElementById('app').innerHTML=`
 <header class="wrap hero"><div><div class="eyebrow">Personal Fitness Coach</div><h1>${esc(d.tagline)}</h1><p class="muted">${esc(d.intro)}</p><a class="btn" href="${wa}" target="_blank">Start Your Transformation</a><a class="btn outline" href="${esc(d.instagram)}" target="_blank">Instagram</a></div><img src="${esc(d.hero_image)}" alt="${esc(d.coach_name)}"></header>
 <section id="about" class="alt"><div class="wrap about"><img src="${esc(d.hero_image)}"><div><div class="eyebrow">Meet Your Coach</div><h2>${esc(d.coach_name)}</h2><p class="muted">${esc(d.about)}</p><p>✓ Certified Personal Trainer — Gold's Gym Fitness Institute</p><p>✓ NASM CPT — Pursuing</p></div></div></section>
 <section id="services"><div class="wrap"><div class="eyebrow">Coaching Services</div><h2>Built Around Your Goal</h2><div class="grid">${['Personal Training','Online Fitness Coaching','Fat Loss Coaching','Body Transformation','Strength & Muscle Building','Corrective Exercise & Mobility'].map(x=>`<div class="card"><h3>${x}</h3><p class="muted">Personalized, goal-based coaching with progress tracking and practical guidance.</p></div>`).join('')}</div></div></section>
 <section id="transformations" class="alt"><div class="wrap"><div class="eyebrow">Real Progress</div><h2>Client Transformations</h2><div class="grid">${trans}</div></div></section>
 <section id="vlogs"><div class="wrap"><div class="eyebrow">Watch & Learn</div><h2>Fitness Vlogs</h2><div class="grid">${vlogs}</div></div></section>
 <footer><div class="wrap">© 2026 ${esc(d.coach_name)} — Personal Fitness Coach</div></footer><a class="wa" href="${wa}" target="_blank">WhatsApp</a>`;
}).catch(()=>document.getElementById('app').innerHTML='<div class="wrap" style="padding:80px 0">Could not load website content.</div>');
</script></body></html>
